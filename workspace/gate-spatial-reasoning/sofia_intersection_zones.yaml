    also_leading_w:            # lanes that functionally exit toward w
      - L1_n_ws
      - L7_e_w
      - L8_e_sw

  L22_ne_w:
    type: lane
    role: incoming
    from_approach: ne
    exit_side: w
    also_leading_w:            # lanes that functionally exit toward w
      - L1_n_ws
      - L7_e_w
      - L8_e_sw

  # ---- Crosswalks ----
  C1_n:
    type: crosswalk
    side: n
    crosses_lanes:                # lanes intersecting this side
      - L1_n_ws
      - L2_n_s
      - L3_n_e
      - L4_all_n
      - L5_all_n
      - L6_e_n
      - L13_s_n
      - L14_s_n
      - L20_w_n
