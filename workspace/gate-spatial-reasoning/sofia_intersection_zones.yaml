      - L18_w_es
      - L19_w_e

  L12_s_e:
    type: lane
    role: incoming
    from_approach: s
    exit_side: e
    exits_to_e:                # canonical outgoing lanes (any-approach)
      - L10_all_e
      - L11_all_e
    also_leading_e:            # lanes that functionally exit toward e
      - L3_n_e
      - L18_w_es
      - L19_w_e

  L13_s_n:
    type: lane
    role: incoming
    from_approach: s
    exit_side: n
    exits_to_n:                # canonical outgoing lanes (any-approach)
      - L4_all_n
      - L5_all_n
    also_leading_n:            # lanes that functionally exit toward n
