# ------------------------------------------------------------
# Side summaries (for spatial filtering)
# ------------------------------------------------------------
by_side:
  n:    # north
    incoming_lanes:                  [L1_n_ws, L2_n_s, L3_n_e]
    outgoing_lanes:                  [L4_all_n, L5_all_n]
    incoming_lanes_exiting_here:     [L6_e_n, L13_s_n, L14_s_n, L20_w_n]
    crosswalks:                      [C1_n, C2_n]
    subway_exits:                    [SE1_n, SE2_n]
    islands:                         [IS1_n]
    bus_bays:                        [BB1_n]

  s:    # south
    incoming_lanes:                  [L12_s_e, L13_s_n, L14_s_n]
    outgoing_lanes:                  [L15_all_s, L16_all_s, L17_all_s]
    incoming_lanes_exiting_here:     [L1_n_ws, L2_n_s, L8_e_sw, L9_e_s, L18_w_es]
    crosswalks:                      [C4_s]
    subway_exits:                    [SE4_s]

  e:    # east
    incoming_lanes:                  [L6_e_n, L7_e_w, L8_e_sw, L9_e_s]
    outgoing_lanes:                  [L10_all_e, L11_all_e]
    incoming_lanes_exiting_here:     [L3_n_e, L12_s_e, L18_w_es, L19_w_e]
    crosswalks:                      [C3_e]
    subway_exits:                    [SE3_e]
    islands:                         [IS2_e]

  w:    # west
    incoming_lanes:                  [L18_w_es, L19_w_e, L20_w_n]
    incoming_lanes_exiting_here:     [L1_n_ws, L7_e_w, L8_e_sw, L21_ne_w, L22_ne_w]
    crosswalks:                      [C5_w]
    subway_exits:                    [SE5_w, SE6_w]
    islands:                         [IS3_w, IS4_w]

  ne:    # north-east diagonal approach
    incoming_lanes:                  [L21_ne_w, L22_ne_w]

# ------------------------------------------------------------
# Notes for the agent
# ------------------------------------------------------------
notes:
  - |
    A lane suffixed <from>_<to> with a single cardinal <from> is INCOMING
    from that approach and exits toward <to>. Example: L2_n_s = from north,
    continues south.
  - |
    A lane suffixed all_<side> is canonically OUTGOING toward <side>,
    reachable from any incoming approach that turns that way.
  - |
    'exits_to_<side>' relations are derived from the from/to suffixes and
    represent permissible movements at the lane level. Per-vehicle legality
    (red lights, signage, time of day) is NOT encoded here.
  - |
    The dataset contains 7 canonical 'all_<side>' outgoing lanes (toward N,
    E, S) but no canonical 'all_w' outgoing lane. Lanes such as L7_e_w and
    L19_w_e effectively carry westbound traffic and are listed under
    'also_leading_w' for any incoming lane that may exit toward west.
  - |
    Crosswalks, subway exits, islands and bus bays sharing the same side
    are grouped under 'by_side' for quick spatial queries.
