    type: lane
    role: incoming
    from_approach: s
    exit_side: n
    exits_to_n:                # canonical outgoing lanes (any-approach)
      - L4_all_n
      - L5_all_n
    also_leading_n:            # lanes that functionally exit toward n
      - L6_e_n
      - L20_w_n

  L15_all_s:
    type: lane
    role: outgoing
    from_approach: any
    exit_side: s
    entered_from:                 # incoming lanes that may exit here
      - L1_n_ws
      - L2_n_s
      - L8_e_sw
      - L9_e_s
      - L18_w_es

  L16_all_s:
    type: lane
    role: outgoing
    from_approach: any
    exit_side: s
    entered_from:                 # incoming lanes that may exit here
      - L1_n_ws
      - L2_n_s
      - L8_e_sw
      - L9_e_s
      - L18_w_es

  L17_all_s:
    type: lane
    role: outgoing
    from_approach: any
    exit_side: s
    entered_from:                 # incoming lanes that may exit here
      - L1_n_ws
      - L2_n_s
      - L8_e_sw
      - L9_e_s
      - L18_w_es

  L18_w_es:
    type: lane
    role: incoming
    from_approach: w
    exit_sides: [e, s]
    exits_to_e:                # canonical outgoing lanes (any-approach)
      - L10_all_e
      - L11_all_e
    also_leading_e:            # lanes that functionally exit toward e
      - L3_n_e
      - L12_s_e
    exits_to_s:                # canonical outgoing lanes (any-approach)
      - L15_all_s
