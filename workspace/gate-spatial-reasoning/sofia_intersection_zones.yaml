  C2_n:
    type: crosswalk
    side: n
    crosses_lanes:                # lanes intersecting this side
      - L1_n_ws
      - L2_n_s
      - L3_n_e
      - L4_all_n
      - L5_all_n
      - L6_e_n
      - L13_s_n
      - L14_s_n
      - L20_w_n
