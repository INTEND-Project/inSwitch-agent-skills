# ============================================================
# Sofia intersection — semantic zone map
# Site: Cherni Vruh Boulevard × Sreburna Street, Sofia, Bulgaria
# Source: GATE Institute (INTEND iDataSpace use case)
# Reference: Peykova, Petrova-Antonova, Karamitov (2024).
#   "Data Processing and Enrichment of LiDAR-Derived Traffic Data",
#   ISPRS Annals X-4/W5-2024, p. 263-270.
#   https://doi.org/10.5194/isprs-annals-X-4-W5-2024-263-2024
# ============================================================

intersection:
  name: "Cherni Vruh Boulevard x Sreburna Street"
  city: "Sofia, Bulgaria"
  sensors: 6           # LiDAR (Ouster OS1) feeding an Augmented LiDAR Box
  data_format: OSEF    # Outsight Open SErialization Format
  zone_count:
    lanes: 22
    crosswalks: 5
    subway_exits: 6
    islands: 4
    bus_bays: 1
    intersection_center: 1

# ------------------------------------------------------------
# Naming convention
# ------------------------------------------------------------
naming_convention:
  pattern_lane: "L<id>_<from_side>_<to_sides>"
  pattern_other: "<TYPE><id>_<side>"
  sides:
    n: north
    s: south
    e: east
    w: west
    ne: north-east (diagonal approach)
    all: any approach (canonical outgoing lane)
  to_sides_compound: |
    Multi-letter suffix lists permitted exit sides without separators.
    Example: L1_n_ws comes from north, may exit west or south (w + s).

# ------------------------------------------------------------
# Zone catalogue (each zone has: type, role, side, links)
# ------------------------------------------------------------
zones:

  I:
    type: intersection_center
    description: "Central conflict area where all approaches meet."
    connects: all_lanes

  # ---- Traffic lanes ----
  L1_n_ws:
    type: lane
    role: incoming
    from_approach: n
    exit_sides: [w, s]
    also_leading_w:            # lanes that functionally exit toward w
      - L7_e_w
      - L8_e_sw
      - L21_ne_w
      - L22_ne_w
    exits_to_s:                # canonical outgoing lanes (any-approach)
      - L15_all_s
      - L16_all_s
      - L17_all_s
    also_leading_s:            # lanes that functionally exit toward s
      - L8_e_sw
      - L9_e_s
      - L18_w_es

  L2_n_s:
    type: lane
    role: incoming
    from_approach: n
    exit_side: s
    exits_to_s:                # canonical outgoing lanes (any-approach)
      - L15_all_s
      - L16_all_s
      - L17_all_s
    also_leading_s:            # lanes that functionally exit toward s
      - L8_e_sw
      - L9_e_s
      - L18_w_es

  L3_n_e:
    type: lane
    role: incoming
    from_approach: n
    exit_side: e
    exits_to_e:                # canonical outgoing lanes (any-approach)
      - L10_all_e
      - L11_all_e
    also_leading_e:            # lanes that functionally exit toward e
      - L12_s_e
      - L18_w_es
      - L19_w_e

  L4_all_n:
    type: lane
    role: outgoing
    from_approach: any
    exit_side: n
    entered_from:                 # incoming lanes that may exit here
      - L6_e_n
      - L13_s_n
      - L14_s_n
      - L20_w_n

  L5_all_n:
    type: lane
    role: outgoing
    from_approach: any
    exit_side: n
    entered_from:                 # incoming lanes that may exit here
      - L6_e_n
      - L13_s_n
      - L14_s_n
      - L20_w_n

  L6_e_n:
    type: lane
    role: incoming
    from_approach: e
    exit_side: n
    exits_to_n:                # canonical outgoing lanes (any-approach)
      - L4_all_n
      - L5_all_n
    also_leading_n:            # lanes that functionally exit toward n
      - L13_s_n
      - L14_s_n
      - L20_w_n

  L7_e_w:
    type: lane
    role: incoming
    from_approach: e
    exit_side: w
    also_leading_w:            # lanes that functionally exit toward w
      - L1_n_ws
      - L21_ne_w
      - L22_ne_w

  L8_e_sw:
    type: lane
    role: incoming
    from_approach: e
    exit_sides: [s, w]
    exits_to_s:                # canonical outgoing lanes (any-approach)
      - L15_all_s
      - L16_all_s
      - L17_all_s
    also_leading_s:            # lanes that functionally exit toward s
      - L1_n_ws
      - L2_n_s
      - L18_w_es
    also_leading_w:            # lanes that functionally exit toward w
      - L1_n_ws
      - L21_ne_w
      - L22_ne_w

  L9_e_s:
    type: lane
    role: incoming
    from_approach: e
    exit_side: s
    exits_to_s:                # canonical outgoing lanes (any-approach)
      - L15_all_s
      - L16_all_s
      - L17_all_s
    also_leading_s:            # lanes that functionally exit toward s
