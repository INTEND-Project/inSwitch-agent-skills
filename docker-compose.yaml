services:
  agent:
    image: songhui/inswitch:${TAG:-latest}
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./workspace:/workspace
      - ./logs:/logs
  dashboard:
    image: songhui/inswitch-dashboard:${TAG:-latest}
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
  test-api:
    image: songhui/inswitch-test-api:${TAG:-latest}
    build:
      context: ./test-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
